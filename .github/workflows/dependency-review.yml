name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        # Soft-fail until the repo's Dependency Graph is enabled
        # (Settings -> Code security and analysis -> Dependency graph).
        # Without it the action errors with "Dependency review is not
        # supported on this repository" and would block every PR.
        continue-on-error: true
        with:
          fail-on-severity: high
