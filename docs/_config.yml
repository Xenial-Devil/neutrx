# GitHub Pages (Jekyll) configuration — served directly from /docs, no local build.
# Theme is fetched and built by GitHub Pages' own Jekyll pipeline via remote_theme.
title: Neutrx
description: Security-first, zero-runtime-dependency HTTP client for Node.js 18+ backends.
remote_theme: just-the-docs/just-the-docs

# Site is published at https://<owner>.github.io/neutrx/
url: "https://xenial-devil.github.io"
baseurl: "/neutrx"

# just-the-docs options
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  GitHub:
    - "https://github.com/Xenial-Devil/neutrx"
  npm:
    - "https://www.npmjs.com/package/neutrx"
aux_links_new_tab: true

# Edit-on-GitHub links per page
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/Xenial-Devil/neutrx"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

last_edit_timestamp: true

color_scheme: dark

footer_content: 'Released under the MIT License. &copy; Neutrx contributors.'

# GitHub Pages-whitelisted plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-include-cache

# Let relative .md links resolve to the rendered .html pages
relative_links:
  enabled: true
  collections: false

# Don't process repo meta files as site pages
exclude:
  - "*.original.md"
  - PLAN.md
  - THREATMODEL.md
  - Gemfile
  - Gemfile.lock
  - vendor
