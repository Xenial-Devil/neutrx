<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180" role="img" aria-labelledby="neutrx-logo-title neutrx-logo-desc">
  <title id="neutrx-logo-title">Neutrx logo</title>
  <desc id="neutrx-logo-desc">Neutrx wordmark with a protected network shield for secure backend HTTP.</desc>
  <defs>
    <linearGradient id="neutrx-shield" x1="14" y1="14" x2="134" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#1763e6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="neutrx-wordmark" x1="182" y1="43" x2="430" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f62fe"/>
      <stop offset="0.58" stop-color="#1763e6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="neutrx-signal" x1="38" y1="47" x2="112" y2="117" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="neutrx-shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#neutrx-shadow)">
    <path d="M80 16 137 37v45c0 39-22 65-57 82-35-17-57-43-57-82V37L80 16Z" fill="url(#neutrx-shield)"/>
    <path d="M80 30 124 46v35c0 29-16 49-44 64-28-15-44-35-44-64V46l44-16Z" fill="#ffffff" opacity="0.12"/>
    <path d="M51 111V66l58 48V69" fill="none" stroke="url(#neutrx-signal)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50 66h20m38 48h18" fill="none" stroke="#dbeafe" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <circle cx="50" cy="66" r="8" fill="#ecfeff"/>
    <circle cx="126" cy="114" r="8" fill="#ecfeff"/>
    <circle cx="80" cy="140" r="5" fill="#ffffff" opacity="0.72"/>
  </g>

  <g>
    <text x="180" y="89" fill="url(#neutrx-wordmark)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="0">Neutrx</text>
    <text x="184" y="124" fill="#64748b" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="0.6">Secure backend HTTP</text>
    <path d="M184 140h246" stroke="#1763e6" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <path d="M184 140h92" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
    <path d="M292 140h58" stroke="#1763e6" stroke-width="4" stroke-linecap="round"/>
    <path d="M366 140h64" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
